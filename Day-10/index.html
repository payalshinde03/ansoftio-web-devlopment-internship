<!DOCTYPE html>
<html>
    <head>
    <title>Shopping card </title>
    <style>
        .Product-card {
            width: 250px;
            border: 2px solid black;
            border-radius: 10px;
            background-color: antiquewhite;
            box-shadow: 0 0 2px 2px;
        }
        .product-image {
            width: 100%;
            border-radius: 10px 10px 0 0;
           
        }
        .product-title {
            font: 15px;
            margin-left: 10px;
        }
        .product-discription {
            margin-left: 10px;
            margin-right: 10px;
        }
       .product-price {
          padding-left: 20px;
          font-size: 20px;
        }
       .btn-buy-now {
          margin: 20px;
          background-color: black;
          color: white;
          border: none;
          padding: 10px 20px;
          border-radius: 30px;
          margin-left: 60px;
       }

    </style>
</head>
<body>
    <div class="Product-card">
        <img src="laptop.jpg" class="product-image" />
        <h2 class="product-title">laptop</h2>

        <p class="product-discription">
A laptop has an all-in-one design, with a built-in monitor 
 keyboard, touchpad (which replaces the mouse), and speakers.
 
        </p>
        <p class="product-price"> ₹ 60,000/-   </p>
            <button class="btn-buy-now">Buy Now </button>
    </div>
</body>
</html>
