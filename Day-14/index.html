<!DOCTYPE html>
<html>

<head>
    <title>Product Page</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
        }

        .product {
            border: 1px solid #ccc;
            padding: 20px;
            margin: 30px;
            width: 300px;
            display: inline-block;
        }

        .product img {
            width: 100%;
        }

        button {
            background-color: #2563EB;
            color: white;
            border: none;
            padding: 10px;
            cursor: pointer;
        }

        button:hover {
            background-color: black;
        }
    </style>
</head>

<body>
    <div class="product">
        <img src="https://media6.ppl-media.com/tr:h-750,w-750,c-at_max,dpr-2,q-40/static/img/product/361983/purplle-sicilian-berries-50-ml_1_display_1722590102_7e713898.jpg">
        <h2>Product Name</h2>
        <p>This is a sample product description.</p>
        <p>Price: ₹999</p>
        <button>Buy Now</button>
    </div>
</body>

</html
